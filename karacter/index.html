<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karacter - define chinese</title>
  <meta
    name="description"
    content="Karacter helps you define Chinese words and characters with offline lookup, handwriting search, HSK 3.0, and lock screen widgets on iPhone."
  />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.eloantourtelier.com/karacter/" />

  <link rel="icon" type="image/png" href="/karacter/KaracterLogo.png" />
  <link rel="apple-touch-icon" href="/karacter/KaracterLogo.png" />
  <link rel="shortcut icon" href="/karacter/KaracterLogo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;600;700&display=swap" rel="stylesheet" />
</head>

<body id="top">
  <div id="app"></div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var p = params.get('p');
      var q = params.get('q');
      if (p !== null) {
        var newUrl = '/' + (p || '');
        if (q) newUrl += '?' + q;
        if (window.location.hash) newUrl += window.location.hash;
        window.history.replaceState(null, '', newUrl);
      }
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
